<p id="footer-meta">
    <span id="footer-date">...</span><br>
    <a href="https://www.facebook.com/profile.php?id=61561660415335" target="_blank" rel="noopener">
        Facebook
    </a>
</p>

<script>
(function() {
    var el = document.getElementById('footer-date');

    if (!el) {
        return;
    }

    function pad(value) {
        return value.toString().padStart(2, '0');
    }

    function updateDate() {
        var now = new Date();

        var day = pad(now.getDate());
        var month = pad(now.getMonth() + 1);
        var year = now.getFullYear();

        var hours = pad(now.getHours());
        var minutes = pad(now.getMinutes());
        var seconds = pad(now.getSeconds());

        el.textContent =
            day + '/' + month + '/' + year +
            ' ' +
            hours + ':' + minutes + ':' + seconds;
    }

    updateDate();
    setInterval(updateDate, 1000);
})();
</script>

{{ $src := .Get "src" }}
{{ $label := .Get "label" | default "Xem minh chứng" }}
{{ $id := printf "evidence-%d" .Ordinal }}

<a href="javascript:void(0)" class="evidence-link" onclick="openEvidenceModal('{{ $id }}')">{{ $label }}</a>

<div id="{{ $id }}" class="evidence-modal" style="display: none;" onclick="closeEvidenceModal('{{ $id }}', event)">
  <span class="evidence-close" onclick="closeEvidenceModal('{{ $id }}', event)">&times;</span>
  <img src="{{ $src }}" alt="Minh chứng" class="evidence-img" onclick="event.stopPropagation()">
</div>

{{ if not (.Page.Scratch.Get "evidence_assets_loaded") }}
{{ .Page.Scratch.Set "evidence_assets_loaded" true }}
<style>
.evidence-link {
  text-decoration: underline;
  cursor: pointer;
  white-space: nowrap;
}
.evidence-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-color: rgba(0, 0, 0, 0.85);
  z-index: 999999;
  display: flex; 
  justify-content: center;
  align-items: center;
}
.evidence-close {
  position: absolute;
  top: 20px;
  right: 30px;
  color: #fff;
  font-size: 40px;
  font-weight: bold;
  cursor: pointer;
  z-index: 1000000;
  user-select: none;
}
.evidence-img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  border-radius: 4px;
}
</style>

<script>
function openEvidenceModal(id) {
  var modal = document.getElementById(id);
  if (modal) modal.style.display = 'flex';
}
function closeEvidenceModal(id, event) {
  var modal = document.getElementById(id);
  if (modal && (event.target === modal || event.target.className === 'evidence-close')) {
    modal.style.display = 'none';
  }
}
document.addEventListener('keydown', function(event) {
  if (event.key === "Escape") {
    document.querySelectorAll('.evidence-modal').forEach(function(modal) {
      modal.style.display = 'none';
    });
  }
});
</script>
{{ end }}
